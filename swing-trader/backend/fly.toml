# fly.toml app configuration file generated for swing-trader-api-small-smoke-8092 on 2026-05-21T12:51:47+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'swing-trader-api-small-smoke-8092'
primary_region = 'bom'

[build]

[env]
  PORT = '8000'
  TIMEZONE = 'Asia/Kolkata'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
